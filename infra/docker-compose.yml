version: '3.8'
services:
  frontend:
    build: ../apps/frontend
    ports:
      - '3000:3000'
    volumes:
      - ../apps/frontend:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
  backend:
    build: ../apps/backend
    ports:
      - '4000:4000'
    volumes:
      - ../apps/backend:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - db
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: church
      POSTGRES_PASSWORD: churchpass
      POSTGRES_DB: churchdb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
